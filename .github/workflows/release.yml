name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - os: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - os: darwin
            arch: amd64
            target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
          - os: darwin
            arch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/pallet pallet-${{ matrix.os }}-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: pallet-${{ matrix.os }}-${{ matrix.arch }}
          path: pallet-${{ matrix.os }}-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
